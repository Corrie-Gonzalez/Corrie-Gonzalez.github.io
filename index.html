<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css">
        </link>
        <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
    </head>
        <title>GEOG 485L/585L -- My First Map </title>
    </head>
    <body>
        <p>
            My first map will appear here:
        </p>
            <div id="mapId" style="height:400px; width: 600px">
            </div>
            <script>
               //Marron Hall (My office) lat/long: 35.08195° N, 106.62324° W
               //create a map variable "mymap" that poits to the map placed in the mapId <div>
                // zoom the view on Marron Hall building at 17 zoom level
                var mymap = L.map('mapId').setView([35.08195, -106.62324], 17);

                //create a variable named "osm" that is used to hold OpenStreetMap tile layer
                var osm = new L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

                //add the OpenStretMap tile layer (i.e., the variable osm you define above) to the map
                osm.addTo(mymap);

            </script>
    </body>
</html>
